services:
  db-master:
    image: 'bitnamilegacy/postgresql:15'
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=dev
      - POSTGRESQL_PASSWORD=password
      - POSTGRESQL_DATABASE=mysns_db
      - POSTGRESQL_POSTGRES_PASSWORD=root_password
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d mysns_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - master_data:/bitnami/postgresql
  db-replica:
    image: 'bitnamilegacy/postgresql:15'
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=db-master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_PASSWORD=password
      - POSTGRESQL_POSTGRES_PASSWORD=root_password
    ports:
      - "54350:5432"
    depends_on:
      db-master:
        condition: service_healthy
    restart: on-failure
    volumes:
      - replica_data:/bitnami/postgresql

  db-test:
    image: 'bitnamilegacy/postgresql:15'
    environment:
      - POSTGRESQL_USERNAME=dev
      - POSTGRESQL_PASSWORD=password
      - POSTGRESQL_DATABASE=mysns_test_db
    ports:
      - '54351:5432'

  redis:
    image: redis:7-alpine
    container_name: mysns-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
